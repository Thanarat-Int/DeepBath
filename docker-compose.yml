# ============================================================================
#  DeepBaht · Local development stack
# ----------------------------------------------------------------------------
#  `name:` overrides the auto-detected project name (which would otherwise
#  derive from the parent folder), so volumes/networks are prefixed
#  `deepbaht_…` instead of `autox-scb-ai_…`.
#
#  Services:
#    - postgres      Postgres 16 with pgvector (RAG + transactions in one DB)
#    - langfuse-db   Dedicated Postgres for LangFuse (keeps app data isolated)
#    - langfuse      LangFuse self-hosted observability dashboard
#    - mcp-server    Custom Banking MCP server (HTTP transport)
#    - backend       FastAPI + LangGraph multi-agent service
#    - frontend      Next.js 15 chat UI (added Day 3)
#  Bring up:  docker compose up --build
# ============================================================================
name: deepbaht

services:
  # ---------------------------------------------------------------- Postgres
  # Host port 4432 (NOT 5432) so it doesn't clash with other local Postgres
  # instances. Container port stays 5432 — services on the same Docker network
  # still reach it via `postgres:5432`.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: deepbaht-postgres
    environment:
      POSTGRES_USER: deepbaht
      POSTGRES_PASSWORD: deepbaht_dev
      POSTGRES_DB: deepbaht
    ports:
      - "4432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/seed:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepbaht -d deepbaht"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------- LangFuse DB
  langfuse-db:
    image: postgres:16-alpine
    container_name: deepbaht-langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse_dev
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------- LangFuse UI
  langfuse:
    image: langfuse/langfuse:2
    container_name: deepbaht-langfuse
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse_dev@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:4002
      NEXTAUTH_SECRET: dev-secret-change-in-prod
      SALT: dev-salt-change-in-prod
      TELEMETRY_ENABLED: "false"
    ports:
      - "4002:3000"

  # ---------------------------------------------------------------- MCP server
  mcp-server:
    build: ./mcp-server
    container_name: deepbaht-mcp
    ports:
      - "4765:4765"
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 4765
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------- Backend
  backend:
    build: ./backend
    container_name: deepbaht-backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://deepbaht:deepbaht_dev@postgres:5432/deepbaht
      DATABASE_URL_RO: postgresql+asyncpg://deepbaht_ro:deepbaht_ro_dev@postgres:5432/deepbaht
      MCP_SERVER_URL: http://mcp-server:4765
      LANGFUSE_HOST: http://langfuse:3000
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      mcp-server:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 4000 --reload

  # ---------------------------------------------------------------- Frontend (Day 3)
  # frontend:
  #   build: ./frontend
  #   container_name: deepbaht-frontend
  #   ports:
  #     - "4001:3000"
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://localhost:4000
  #     # frontend container also runs on internal port 4001 (matching host)
  #   depends_on:
  #     - backend

volumes:
  postgres_data:
  langfuse_data:
  hf_cache:
