# ============================================================================
#  AutoX-SCB AI · Local development stack
# ----------------------------------------------------------------------------
#  Services:
#    - postgres      Postgres 16 with pgvector (RAG + transactions in one DB)
#    - langfuse-db   Dedicated Postgres for LangFuse (keeps app data isolated)
#    - langfuse      LangFuse self-hosted observability dashboard
#    - mcp-server    Custom Banking MCP server (HTTP transport)
#    - backend       FastAPI + LangGraph multi-agent service
#    - frontend      Next.js 15 chat UI (added Day 3)
#  Bring up:  docker compose up --build
# ============================================================================
services:
  # ---------------------------------------------------------------- Postgres
  postgres:
    image: pgvector/pgvector:pg16
    container_name: autox-postgres
    environment:
      POSTGRES_USER: autox
      POSTGRES_PASSWORD: autox_dev
      POSTGRES_DB: autox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/seed:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autox -d autox"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------- LangFuse DB
  langfuse-db:
    image: postgres:16-alpine
    container_name: autox-langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse_dev
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------- LangFuse UI
  langfuse:
    image: langfuse/langfuse:2
    container_name: autox-langfuse
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse_dev@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: dev-secret-change-in-prod
      SALT: dev-salt-change-in-prod
      TELEMETRY_ENABLED: "false"
    ports:
      - "3001:3000"

  # ---------------------------------------------------------------- MCP server
  mcp-server:
    build: ./mcp-server
    container_name: autox-mcp
    ports:
      - "8765:8765"
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8765
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------- Backend
  backend:
    build: ./backend
    container_name: autox-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://autox:autox_dev@postgres:5432/autox
      MCP_SERVER_URL: http://mcp-server:8765
      LANGFUSE_HOST: http://langfuse:3000
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      mcp-server:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ---------------------------------------------------------------- Frontend (Day 3)
  # frontend:
  #   build: ./frontend
  #   container_name: autox-frontend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://localhost:8000
  #   depends_on:
  #     - backend

volumes:
  postgres_data:
  langfuse_data:
  hf_cache:
